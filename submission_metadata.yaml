# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Antigravity IDE (Claude)"

ai_usage_summary: |
  Used Antigravity IDE (Claude Opus) for architecture discussion, code scaffolding,
  and iterative development. All scoring logic, skill taxonomy, honeypot heuristics,
  and ranking algorithms are original engineering work. No candidate data was fed
  to any external LLM during ranking. The ranking pipeline uses zero ML libraries -
  pure Python standard library with feature engineering and weighted scoring.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Feature-engineering ranker with multi-dimensional scoring and explicit
  honeypot detection. Six scoring dimensions: Role Fit (30%, title-career
  coherence), Skills Match (25%, semantic taxonomy with trust multipliers),
  Career Quality (15%, product-vs-services, tenure), Education (5%, tier/field),
  Behavioral Signals (15%, availability/responsiveness), and Red Flags (10%,
  multiplicative penalty for keyword-stuffers, consulting-only careers, domain
  mismatch). Hand-crafted skill taxonomy maps 150+ skills to 11 categories.
  Honeypot detector uses 7 heuristic checks. Runtime: ~35 seconds for 100K
  candidates on CPU. Zero external dependencies for ranking.

