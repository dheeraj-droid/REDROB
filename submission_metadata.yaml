ai_usage_summary: |
  Used Antigravity IDE (Gemini-based AI agent) for architecture discussion,
  code scaffolding, and iterative development. All scoring logic, skill
  taxonomy, honeypot heuristics, and ranking algorithms are original
  engineering work developed through human-AI pair programming. No candidate
  data was fed to any external LLM during ranking. The pipeline runs fully
  offline after initial model download.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage hybrid ranker combining rule-based scoring, semantic embeddings,
  and cross-encoder reranking. Stage 1 scores all 100K candidates with a
  6-dimension rule engine (Role Fit, Skills Match, Career Quality, Education,
  Behavioral Signals, Red Flags) and a 10-check honeypot detector that catches
  ~68% of candidates as traps via summary-title contradiction, title-description
  domain clash, self-learner template detection, career incoherence, and
  skill-career mismatch analysis. Stage 2 embeds only the top 500 survivors
  using BAAI/bge-small-en-v1.5 for semantic similarity. Stage 3 applies
  cross-encoder/ms-marco-MiniLM-L-6-v2 reranking on the top 200. A hand-crafted
  skill taxonomy maps 150+ skills to 11 relevance categories. Fairness audit
  checks representation across college tier, location, and experience band.
  Total runtime: ~143 seconds for 100K candidates on CPU. Zero honeypots in
  top 100. Top 10 are all Senior AI/ML/NLP Engineers.

